<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>🏎️ نيو دريفت - Neon Drift</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; font-family: Arial, sans-serif; }
        
        #gameContainer { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        /* شريط النقاط العلوي */
        .score-bar { width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #1e293b; color: #fff; font-size: 1.2rem; font-weight: bold; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .high-score { color: #f59e0b; }

        /* منطقة اللعب */
        #canvasContainer { flex: 1; width: 100%; position: relative; background: #1e293b; display: flex; justify-content: center; }
        canvas { background: #334155; display: block; width: 100%; height: 100%; max-width: 500px; }

        /* أزرار التحكم باللمس أسفل الشاشة */
        .controls-container { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px 30px; display: flex; justify-content: space-between; background: #0f172a; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 20; pointer-events: none; }
        .ctrl-btn { width: 85px; height: 85px; background: rgba(255, 255, 255, 0.12); border: 3px solid #64748b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: #fff; pointer-events: auto; touch-action: none; box-shadow: 0 6px 15px rgba(0,0,0,0.5); }
        .ctrl-btn:active { background: rgba(56, 189, 248, 0.3); border-color: #38bdf8; transform: scale(0.92); }

        /* الشاشات المنبثقة */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; text-align: center; }
        .popup-box { background: #1e293b; border: 2px solid #38bdf8; padding: 30px 25px; border-radius: 24px; width: 90%; max-width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .popup-box h1 { color: #38bdf8; font-size: 2rem; margin-bottom: 15px; text-shadow: 0 0 10px rgba(56,189,248,0.3); }
        .popup-box p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 25px; }
        .btn-main { background: linear-gradient(135deg, #38bdf8, #0284c7); color: white; border: none; padding: 14px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; box-shadow: 0 4px 12px rgba(2,132,199,0.4); }
        .btn-main:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div class="score-bar">
            <div>🚗 النقاط: <span id="scoreDisplay">0</span></div>
            <div class="high-score">🏆 الأعلى: <span id="highDisplay">0</span></div>
        </div>

        <div id="canvasContainer">
            <canvas id="gameCanvas"></canvas>

            <div class="controls-container">
                <div class="ctrl-btn" id="btnLeft">◀️</div>
                <div class="ctrl-btn" id="btnRight">▶️</div>
            </div>
        </div>
    </div>

    <div class="overlay" id="startOverlay">
        <div class="popup-box">
            <h1>🏎️ نيو دريفت</h1>
            <p>تفادى السيارات الأخرى وسجل أعلى رقم قياسي!</p>
            <button class="btn-main" onclick="startGame()">ابدأ السباق 🏁</button>
        </div>
    </div>

    <div class="overlay" id="gameOverOverlay" style="display: none;">
        <div class="popup-box">
            <h1 style="color: #ef4444;">💥 تحطمت السيارة!</h1>
            <p id="finalScoreText">النقاط التي أحرزتها: 0</p>
            <button class="btn-main" style="background: linear-gradient(135deg, #ef4444, #b91c1c);" onclick="resetGame()">إعادة المحاولة 🔄</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let highScore = localStorage.getItem('neon_drift_high') || 0;
        let gameActive = false;
        let player, obstacles, animationFrameId, obstacleTimer;
        let speed = 5;

        // إعداد أبعاد الكانفاس لتناسب الشاشة
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth > 500 ? 500 : canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        document.getElementById('highDisplay').innerText = highScore;

        // التحكم باللمس (أزرار مصلحة ومؤكدة 100%)
        const keys = { left: false, right: false };
        
        const bLeft = document.getElementById('btnLeft');
        const bRight = document.getElementById('btnRight');

        // زر اليسار يحرك يساراً
        bLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
        bLeft.addEventListener('touchend', () => keys.left = false);

        // زر اليمين يحرك يميناً
        bRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
        bRight.addEventListener('touchend', () => keys.right = false);

        // دعم لوحة المفاتيح للكمبيوتر أيضاً
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });

        function startGame() {
            document.getElementById('startOverlay').style.display = 'none';
            document.getElementById('gameOverOverlay').style.display = 'none';
            gameActive = true;
            score = 0;
            speed = 5;
            document.getElementById('scoreDisplay').innerText = score;
            
            player = {
                x: canvas.width / 2 - 20,
                y: canvas.height - 180,
                width: 40,
                height: 70,
                color: '#38bdf8'
            };

            obstacles = [];
            if (obstacleTimer) clearInterval(obstacleTimer);
            obstacleTimer = setInterval(spawnObstacle, 1200);

            updateGame();
        }

        function spawnObstacle() {
            if (!gameActive) return;
            const width = 40;
            const height = 70;
            const x = Math.random() * (canvas.width - width - 40) + 20;
            const colors = ['#ef4444', '#eab308', '#a855f7', '#10b981'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            obstacles.push({ x, y: -height, width, height, color });
        }

        function updateGame() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // رسم حواف الطريق اليمين واليسار
            ctx.fillStyle = '#64748b';
            ctx.fillRect(10, 0, 6, canvas.height);
            ctx.fillRect(canvas.width - 16, 0, 6, canvas.height);

            // تحريك اللاعب
            if (keys.left && player.x > 20) player.x -= 6;
            if (keys.right && player.x < canvas.width - player.width - 20) player.x += 6;

            // رسم سيارة اللاعب (مستطيل انسيابي كسيارة سباق)
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // زجاج السيارة الأمامي
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 5, player.y + 15, player.width - 10, 15);

            // تحريك ورسم العقبات (السيارات الأخرى)
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += speed;

                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = '#fff';
                ctx.fillRect(obs.x + 5, obs.y + 40, obs.width - 10, 15);

                // فحص التصادم
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    gameOver();
                }

                // كسب النقاط عند تجاوز السيارة
                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById('scoreDisplay').innerText = score;
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('neon_drift_high', highScore);
                        document.getElementById('highDisplay').innerText = highScore;
                    }
                    if (score % 5 === 0) speed += 0.5; // زيادة الصعوبة
                }
            }

            animationFrameId = requestAnimationFrame(updateGame);
        }

        function gameOver() {
            gameActive = false;
            cancelAnimationFrame(animationFrameId);
            clearInterval(obstacleTimer);
            document.getElementById('finalScoreText').innerText = "النقاط التي أحرزتها: " + score;
            document.getElementById('gameOverOverlay').style.display = 'flex';
        }

        function resetGame() {
            startGame();
        }
    </script>
</body>
</html>
