<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز ألعابي 🎮</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        h1 { margin-bottom: 30px; font-size: 2rem; color: #38bdf8; }
        
        .games-grid { display: flex; flex-direction: column; gap: 20px; align-items: center; max-width: 400px; margin: 0 auto; }
        .game-card { width: 100%; background: #1e293b; border: 2px solid #334155; border-radius: 16px; padding: 20px; cursor: pointer; transition: 0.2s; }
        .game-card:active { transform: scale(0.95); background: #334155; }
        .game-icon { font-size: 3rem; margin-bottom: 10px; }
        .game-title { font-size: 1.4rem; font-weight: bold; }

        /* نافذة تشغيل اللعبة */
        #gameOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 1000; flex-direction: column; }
        #gameOverlay.active { display: flex; }
        
        /* شريط الخروج العلوي المصلح */
        .overlay-header { background: #1e293b; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; }
        .game-iframe-title { font-size: 1.1rem; font-weight: bold; }
        .close-overlay-btn { background: #ef4444; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        iframe { flex: 1; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <h1>🎮 مركز الألعاب الخاص بي</h1>

    <div class="games-grid">
        <div class="game-card" onclick="openGame('candy-hero.html', '🍬 كاندي هيرو')">
            <div class="game-icon">🍬</div>
            <div class="game-title">كاندي هيرو</div>
        </div>

        <div class="game-card" onclick="openGame('new-drift.html', '🏎️ نيو دريفت')">
            <div class="game-icon">🏎️</div>
            <div class="game-title">نيون دريفت</div>
        </div>
    </div>

    <div id="gameOverlay">
        <div class="overlay-header">
            <span class="game-iframe-title" id="currentGameTitle">اللعبة</span>
            <button class="close-overlay-btn" onclick="closeOverlay()">❌ إغلاق وتراجع</button>
        </div>
        <iframe id="gameIframe" src=""></iframe>
    </div>

    <script>
        function openGame(url, title) {
            document.getElementById('currentGameTitle').innerText = title;
            document.getElementById('gameIframe').src = url;
            document.getElementById('gameOverlay').classList.add('active');
        }

        function closeOverlay() {
            document.getElementById('gameOverlay').classList.remove('active');
            document.getElementById('gameIframe').src = ""; // إيقاف اللعبة تماماً عند الخروج
        }
    </script>
</body>
</html>
